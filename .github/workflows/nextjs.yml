# Build and deploy the frontend (Next.js) to GitHub Pages
name: Deploy Next.js frontend to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # NEXT_PUBLIC_* vars are baked into the static build. Add matching secrets in Settings → Environments → github-pages.
      - name: Build (static export for GitHub Pages)
        env:
          GITHUB_PAGES: "true"
          GITHUB_PAGES_BASE_PATH: /${{ github.event.repository.name }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_WS_URL: ${{ secrets.NEXT_PUBLIC_WS_URL }}
          NEXT_PUBLIC_MONAD_CHAIN_ID: ${{ secrets.NEXT_PUBLIC_MONAD_CHAIN_ID }}
          NEXT_PUBLIC_MONAD_RPC_URL: ${{ secrets.NEXT_PUBLIC_MONAD_RPC_URL }}
          NEXT_PUBLIC_COLLATERAL_TOKEN_ADDRESS: ${{ secrets.NEXT_PUBLIC_COLLATERAL_TOKEN_ADDRESS }}
          NEXT_PUBLIC_PREDICTION_MARKET_ADDRESS: ${{ secrets.NEXT_PUBLIC_PREDICTION_MARKET_ADDRESS }}
          NEXT_PUBLIC_RFQ_ENGINE_ADDRESS: ${{ secrets.NEXT_PUBLIC_RFQ_ENGINE_ADDRESS }}
          NEXT_PUBLIC_PARLAY_ENGINE_ADDRESS: ${{ secrets.NEXT_PUBLIC_PARLAY_ENGINE_ADDRESS }}
          NEXT_PUBLIC_YIELD_VAULT_ADDRESS: ${{ secrets.NEXT_PUBLIC_YIELD_VAULT_ADDRESS }}
          NEXT_PUBLIC_STABLECOIN_ADDRESS: ${{ secrets.NEXT_PUBLIC_STABLECOIN_ADDRESS }}
          NEXT_PUBLIC_EXPLORER_API_KEY: ${{ secrets.NEXT_PUBLIC_EXPLORER_API_KEY }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
